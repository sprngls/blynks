<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>
 · Chat</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BLYNKS ALPHA">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="/logo.png">
    <link rel="icon" type="image/png" href="/logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --surface-light: #111111;
            --border: #1f1f1f;
            --accent: #c8f135;
            --accent-glow: rgba(200, 241, 53, 0.3);
            --text: #ffffff;
            --text-muted: #888888;
            --text-dim: #555555;
        }

        body {
            background: var(--bg);
            overflow: hidden;
            height: 100vh;
            font-family: 'Syne', sans-serif;
            color: var(--text);
        }

        .floating-objects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .floating-dot {
            position: absolute;
            width: 2px;
            height: 2px;
            background-color: var(--accent);
            border-radius: 50%;
            opacity: 0.25;
            filter: blur(1px);
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-1000px) translateX(20px);
                opacity: 0;
            }
        }


        .app {
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            background: var(--bg);
            padding-top: 44px;
        }

        /* Top Bar */
        .top-bar {
            height: 70px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.8rem;
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.95);
            position: relative;
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(200, 241, 53, 0.6);
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 10px rgba(200, 241, 53, 0.4); opacity: 1; }
            50% { text-shadow: 0 0 22px rgba(200, 241, 53, 0.8); opacity: 0.95; }
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--surface-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--accent);
            border: 2px solid var(--accent);
            box-shadow: 0 0 8px rgba(200, 241, 53, 0.3);
        }

        .user-name {
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            color: var(--text);
            font-weight: 500;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .logout-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(200, 241, 53, 0.05);
        }


        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }


        .sidebar {
            width: 300px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            flex-shrink: 0;
            z-index: 20;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(4px);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                transform: translateX(-100%);
                z-index: 100;
                box-shadow: 4px 0 25px rgba(0, 0, 0, 0.8);
                width: 280px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .app {
                padding-top: 44px;
            }
        }

        .sidebar-header {
            padding: 1.2rem 1.2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            font-weight: 600;
        }

        .toggle-sidebar {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--accent);
            width: 30px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-sidebar:hover {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .new-chat-btn {
            margin: 1rem;
            padding: 0.8rem;
            background: var(--accent);
            color: #000000;
            border: none;
            border-radius: 40px;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(200, 241, 53, 0.4);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0.6rem;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            padding: 0.8rem 0.8rem;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 0.2rem;
        }

        .chat-item:hover {
            background: var(--surface-light);
        }

        .chat-item.active {
            background: rgba(200, 241, 53, 0.08);
            border-left: 3px solid var(--accent);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--surface-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent);
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .chat-info {
            flex: 1;
            overflow: hidden;
        }

        .chat-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
            color: var(--text);
        }

        .chat-preview {
            font-size: 0.7rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 0.6rem;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        .mobile-menu-btn {
            background: transparent;
            border: none;
            color: var(--accent);
            font-size: 1.3rem;
            cursor: pointer;
            margin-right: 0.8rem;
            display: none;
        }

        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            flex: 1;
            background: var(--bg);
            min-width: 0;
        }

        .chat-header {
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.8);
            flex-shrink: 0;
        }

        .chat-header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--surface-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: var(--accent);
            border: 1px solid var(--border);
        }

        .chat-header-info h2 {
            font-size: 1.05rem;
            margin-bottom: 0.2rem;
            font-weight: 600;
        }

        .chat-header-info p {
            font-size: 0.65rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: var(--bg);
        }

        .message {
            display: flex;
            gap: 0.7rem;
            max-width: 80%;
            animation: fadeInUp 0.25s ease;
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--surface-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--accent);
            flex-shrink: 0;
        }

        .message-bubble {
            background: var(--surface-light);
            padding: 0.7rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            word-break: break-word;
            max-width: 100%;
        }

        .message.own .message-bubble {
            background: var(--accent);
            color: #000000;
            border: none;
        }

        .message-author {
            font-weight: 700;
            font-size: 0.7rem;
            color: var(--accent);
            margin-bottom: 0.2rem;
        }

        .message.own .message-author {
            color: #000000;
        }

        .message-text {
            font-size: 0.88rem;
            line-height: 1.45;
        }

        .message-time {
            font-size: 0.55rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.3rem;
        }

        .message.own .message-time {
            color: rgba(0, 0, 0, 0.6);
        }

        .encrypted-badge {
            font-size: 0.55rem;
            color: var(--accent);
        }

        .chat-input-area {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 1rem 1.5rem;
            padding-bottom: 1rem;
            background: rgba(0, 0, 0, 0.95);
        }

        .input-wrapper {
            background: var(--surface-light);
            border-radius: 48px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.3rem 0.3rem 1.2rem;
            transition: border 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.8rem 0;
            color: var(--text);
            outline: none;
            font-size: 0.95rem;
            font-family: 'Syne', sans-serif;
        }

        .input-wrapper input::placeholder {
            color: var(--text-dim);
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
        }

        .input-wrapper button {
            background: var(--accent);
            border: none;
            border-radius: 48px;
            padding: 0.7rem 1.6rem;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            color: #000;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .input-wrapper button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 16px var(--accent);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            gap: 1rem;
            padding: 2rem;
        }

        .empty-state i {
            font-size: 3.5rem;
            opacity: 0.4;
            color: var(--accent);
        }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .popup {
            background: var(--surface);
            border: 1px solid var(--accent);
            border-radius: 24px;
            padding: 1.8rem;
            max-width: 90%;
            width: 380px;
            animation: popupSlide 0.25s ease;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        @keyframes popupSlide {
            from {
                opacity: 0;
                transform: scale(0.92);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .popup h3 {
            color: var(--accent);
            margin-bottom: 1.2rem;
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .popup input {
            width: 100%;
            padding: 0.9rem;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 14px;
            margin-bottom: 1.2rem;
            outline: none;
            font-size: 0.95rem;
            font-family: 'Syne', sans-serif;
        }

        .popup input:focus {
            border-color: var(--accent);
        }

        .popup-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .popup-btn {
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-family: 'Space Mono', monospace;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .popup-btn-primary {
            background: var(--accent);
            color: #000;
            border: none;
        }

        .popup-btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .popup-btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .popup-btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }


        #connectionStatus {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid var(--accent);
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.7rem;
            display: none;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            font-family: 'Space Mono', monospace;
            color: var(--accent);
        }

        #installAppBtn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--accent);
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.7rem;
            font-family: 'Space Mono', monospace;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 6px;
            z-index: 1000;
            color: #000;
            font-weight: 700;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: var(--surface);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        /* iPad & Tablet spezifische Anpassungen */
        @media (min-width: 768px) and (max-width: 1024px) {
            .app {
                padding-top: 44px;
            }
        }


        @media (max-width: 480px) {
            .message {
                max-width: 90%;
            }
            .chat-messages {
                padding: 1rem;
            }
            .chat-header {
                padding: 0.6rem 1rem;
            }
            .chat-input-area {
                padding: 0.8rem 1rem;
            }
            .input-wrapper button {
                padding: 0.5rem 1.2rem;
                font-size: 0.7rem;
            }
            .app {
                padding-top: 44px;
            }
        }
    </style>
</head>
<body>
    <div class="floating-objects" id="dotsContainer"></div>

    <div class="app">
        <div class="top-bar">
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="logo">BLYNKS ALPHA</div>
            </div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">?</div>
                <span class="user-name" id="userName">Laden...</span>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Exit</button>
            </div>
        </div>

        <div class="main-layout">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h3><i class="fas fa-comments"></i> DIREKTNACHRICHTEN</h3>
                    <button class="toggle-sidebar" id="toggleSidebar">◀</button>
                </div>
                <button class="new-chat-btn" id="newChatBtn">
                    <i class="fas fa-plus"></i> <span>Neuer Chat</span>
                </button>
                <div class="chat-list" id="chatList">
                    <div class="empty-state">
                        <i class="fas fa-comments"></i>
                        <p>Keine Chats</p>
                    </div>
                </div>
            </div>

            <div class="chat-area">
                <div class="chat-header" id="chatHeader" style="display: none;">
                    <div class="chat-header-avatar" id="chatHeaderAvatar">?</div>
                    <div class="chat-header-info">
                        <h2 id="chatHeaderName">Kein Chat ausgewählt</h2>
                        <p><i class="fas fa-lock"></i> Ende-zu-Ende verschlüsselt</p>
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="empty-state">
                        <i class="fas fa-comment-dots"></i>
                        <p>Wähle einen Chat aus</p>
                        <p style="font-size: 0.7rem;">🔒 Sichere, verschlüsselte Nachrichten</p>
                    </div>
                </div>

                <div class="chat-input-area" id="chatInputArea" style="display: none;">
                    <div class="input-wrapper">
                        <input type="text" id="messageInput" placeholder="Nachricht schreiben... 🔒">
                        <button id="sendBtn"><i class="fas fa-paper-plane"></i> Senden</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="connectionStatus"><i class="fas fa-wifi"></i> Online</div>
    <button id="installAppBtn"><i class="fas fa-download"></i> Install App</button>

    <div class="popup-overlay" id="newChatPopup">
        <div class="popup">
            <h3><i class="fas fa-user-plus"></i> Neuen Chat starten</h3>
            <input type="text" id="newChatUsername" placeholder="Benutzername" autocomplete="off">
            <div class="popup-buttons">
                <button class="popup-btn popup-btn-primary" id="createChatBtn">Starten</button>
                <button class="popup-btn popup-btn-secondary" id="closePopupBtn">Abbrechen</button>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/pwa.js"></script>
    <script>
        function createFloatingDots() {
            const container = document.getElementById('dotsContainer');
            if (!container) return;
            while (container.firstChild) container.removeChild(container.firstChild);
            
            const isMobile = window.innerWidth <= 768;
            const dotCount = isMobile ? 30 : 55;
            
            for (let i = 0; i < dotCount; i++) {
                const dot = document.createElement('div');
                dot.className = 'floating-dot';
                dot.style.left = `${Math.random() * 100}%`;
                dot.style.bottom = `${-5}%`;
                dot.style.animationDelay = `${Math.random() * 20}s`;
                dot.style.animationDuration = `${12 + Math.random() * 12}s`;
                const size = isMobile ? Math.random() * 2 + 1 : Math.random() * 3 + 1;
                dot.style.width = `${size}px`;
                dot.style.height = `${size}px`;
                container.appendChild(dot);
            }
        }

        function toggleMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('open');
            }
        }

        class ChatClient {
            constructor() {
                this.currentChatId = null;
                this.chats = [];
                this.messages = [];
                this.pollingInterval = null;
                this.lastMessageTime = null;
                this.isLoading = false;
            }
            
            async init() {
                await this.loadChats();
                this.startPolling();
                this.setupEventListeners();
            }
            
            async loadChats() {
                try {
                    const response = await fetch('/api/chats', { credentials: 'include' });
                    const data = await response.json();
                    if (data.success) {
                        this.chats = data.chats;
                        this.renderChatList();
                    }
                } catch (error) {
                    console.error('Fehler:', error);
                }
            }
            
            formatTime(timestamp) {
                if (!timestamp) return '';
                try {
                    const date = new Date(timestamp);
                    if (isNaN(date.getTime())) return '';
                    const now = new Date();
                    if (date.toDateString() === now.toDateString()) {
                        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    }
                    const yesterday = new Date(now);
                    yesterday.setDate(now.getDate() - 1);
                    if (date.toDateString() === yesterday.toDateString()) return 'Gestern';
                    return date.toLocaleDateString([], { day: '2-digit', month: '2-digit' });
                } catch(e) { return ''; }
            }
            
            renderChatList() {
                const container = document.getElementById('chatList');
                if (!container) return;
                
                if (this.chats.length === 0) {
                    container.innerHTML = `<div class="empty-state"><i class="fas fa-comments"></i><p>Keine Chats</p><button onclick="document.getElementById('newChatBtn').click()" style="background:var(--accent);color:#000;border:none;padding:0.6rem 1.2rem;border-radius:30px;margin-top:0.6rem;cursor:pointer;font-weight:600;">+ Neuer Chat</button></div>`;
                    return;
                }
                
                container.innerHTML = '';
                this.chats.forEach(chat => {
                    const isActive = this.currentChatId === chat.chat_id;
                    const lastMsg = chat.last_message || 'Keine Nachrichten';
                    const time = this.formatTime(chat.last_message_time);
                    const avatar = chat.type === 'group' ? '👥' : (chat.display_name?.charAt(0) || '?');
                    
                    const div = document.createElement('div');
                    div.className = `chat-item ${isActive ? 'active' : ''}`;
                    div.onclick = () => { this.selectChat(chat.chat_id); if(window.innerWidth<=768) document.getElementById('sidebar').classList.remove('open'); };
                    div.innerHTML = `
                        <div class="chat-avatar">${avatar}</div>
                        <div class="chat-info"><div class="chat-name">${this.escapeHtml(chat.display_name || chat.name || 'Unbekannt')}</div>
                        <div class="chat-preview">${this.escapeHtml(lastMsg.substring(0, 38))}${lastMsg.length>38?'...':''}</div></div>
                        <div class="chat-time">${time}</div>`;
                    container.appendChild(div);
                });
            }
            
            async selectChat(chatId) {
                if (this.currentChatId === chatId) return;
                this.currentChatId = chatId;
                this.messages = [];
                this.renderChatList();
                await this.loadMessages();
                this.renderMessages();
                
                const chat = this.chats.find(c => c.chat_id === chatId);
                if (chat) {
                    document.getElementById('chatHeader').style.display = 'flex';
                    document.getElementById('chatHeaderName').textContent = chat.display_name || chat.name || 'Chat';
                    document.getElementById('chatHeaderAvatar').textContent = chat.type === 'group' ? '👥' : (chat.display_name?.charAt(0) || '?');
                }
                document.getElementById('chatInputArea').style.display = 'block';
                document.getElementById('messageInput').focus();
            }
            
            async loadMessages() {
                if (!this.currentChatId || this.isLoading) return;
                this.isLoading = true;
                try {
                    let url = `/api/chats/${this.currentChatId}/messages?limit=50`;
                    if (this.lastMessageTime) url += `&before=${encodeURIComponent(this.lastMessageTime)}`;
                    const response = await fetch(url, { credentials: 'include' });
                    const data = await response.json();
                    if (data.success && data.messages.length > 0) {
                        const existingIds = new Set(this.messages.map(m => m.id));
                        const newMessages = data.messages.filter(m => !existingIds.has(m.id));
                        if (newMessages.length > 0) {
                            this.messages = [...this.messages, ...newMessages];
                            this.messages.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
                            this.lastMessageTime = data.messages[0]?.created_at;
                            this.renderMessages();
                            this.renderChatList();
                        }
                    }
                } catch(e) { console.error(e); }
                finally { this.isLoading = false; }
            }
            
            renderMessages() {
                const container = document.getElementById('chatMessages');
                if (!container) return;
                if (this.messages.length === 0) {
                    container.innerHTML = `<div class="empty-state"><i class="fas fa-comment-dots"></i><p>Keine Nachrichten</p><p style="font-size:0.7rem;">🔒 Schreibe die erste Nachricht</p></div>`;
                    return;
                }
                container.innerHTML = '';
                this.messages.forEach(msg => {
                    const isOwn = msg.user_id === window.currentUserId;
                    const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
                    const div = document.createElement('div');
                    div.className = `message ${isOwn ? 'own' : ''}`;
                    div.innerHTML = `
                        <div class="message-avatar">${isOwn ? (window.currentUser?.charAt(0) || 'Du') : (msg.username?.charAt(0) || '?')}</div>
                        <div class="message-bubble">
                            ${!isOwn ? `<div class="message-author">${this.escapeHtml(msg.username)}</div>` : ''}
                            <div class="message-text">${this.escapeHtml(msg.message)}</div>
                            <div class="message-time">${time} <span class="encrypted-badge"><i class="fas fa-lock"></i></span></div>
                        </div>`;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            }
            
            async sendMessage() {
                const input = document.getElementById('messageInput');
                const text = input.value.trim();
                if (!text || !this.currentChatId) return;
                
                const tempMsg = { id:'temp_'+Date.now(), chatId:this.currentChatId, userId:window.currentUserId, username:window.currentUser, avatar:window.currentUser?.charAt(0)||'?', message:text, messageType:'text', createdAt:new Date().toISOString(), isOwn:true };
                this.messages.push(tempMsg);
                this.renderMessages();
                input.value = '';
                
                try {
                    const response = await fetch(`/api/chats/${this.currentChatId}/messages`, {
                        method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
                        body:JSON.stringify({message:text})
                    });
                    const data = await response.json();
                    if (data.success) {
                        this.messages = this.messages.filter(m => m.id !== tempMsg.id);
                        this.messages.push(data.message);
                        this.messages.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
                        this.renderMessages();
                        this.renderChatList();
                    }
                } catch(e) { console.error(e); }
            }
            
            async createDirectMessage(username) {
                try {
                    const response = await fetch('/api/chats/dm', {
                        method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
                        body:JSON.stringify({username})
                    });
                    const data = await response.json();
                    if (data.success) {
                        await this.loadChats();
                        await this.selectChat(data.chatId);
                        this.hideNewChatPopup();
                    } else alert(data.error || 'Benutzer nicht gefunden');
                } catch(e) { alert('Verbindungsfehler'); }
            }
            
            startPolling() {
                if(this.pollingInterval) clearInterval(this.pollingInterval);
                this.pollingInterval = setInterval(() => {
                    if(this.currentChatId) this.loadMessages();
                    this.loadChats();
                }, 2000);
            }
            
            setupEventListeners() {
                document.getElementById('messageInput')?.addEventListener('keypress', (e) => { if(e.key==='Enter') this.sendMessage(); });
                document.getElementById('sendBtn')?.addEventListener('click', () => this.sendMessage());
            }
            
            showNewChatPopup() { document.getElementById('newChatPopup').style.display = 'flex'; document.getElementById('newChatUsername').focus(); }
            hideNewChatPopup() { document.getElementById('newChatPopup').style.display = 'none'; document.getElementById('newChatUsername').value = ''; }
            escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
        }
        
        let chat;
        document.addEventListener('DOMContentLoaded', async () => {
            createFloatingDots();
            await window.auth.checkSession();
            if (!window.auth.isAuthenticated()) { window.location.href = '/login.html'; return; }
            window.currentUser = window.auth.currentUser?.username;
            window.currentUserId = window.auth.currentUser?.id;
            document.getElementById('userName').textContent = window.currentUser || 'Benutzer';
            document.getElementById('userAvatar').textContent = window.currentUser?.charAt(0) || '?';
            chat = new ChatClient();
            await chat.init();
            
            // ============ AUTOMATISCHE BENACHRICHTIGUNGSANFRAGE ============
            // Warte 1 Sekunde nach dem Laden und frage dann nach Benachrichtigungen
            setTimeout(async () => {
                if (Notification && Notification.permission === 'default') {
                    console.log('📢 Frage nach Benachrichtigungsberechtigung...');
                    const permission = await Notification.requestPermission();
                    if (permission === 'granted') {
                        console.log('✅ Benachrichtigungen aktiviert');
                        // Push-Subscription beim Server registrieren
                        if (window.pwa) {
                            await window.pwa.subscribeToPush();
                        }
                        // Kurze Bestätigung anzeigen
                        const statusMsg = document.createElement('div');
                        statusMsg.textContent = '🔔 Benachrichtigungen aktiviert';
                        statusMsg.style.cssText = 'position:fixed;bottom:80px;left:20px;background:var(--accent);color:#000;padding:8px 16px;border-radius:30px;font-size:0.7rem;z-index:1002;font-family:monospace;';
                        document.body.appendChild(statusMsg);
                        setTimeout(() => statusMsg.remove(), 3000);
                    } else if (permission === 'denied') {
                        console.log('❌ Benachrichtigungen abgelehnt');
                    }
                }
            }, 1000);
        });
        
        document.getElementById('logoutBtn')?.addEventListener('click', () => window.auth.logout());
        document.getElementById('toggleSidebar')?.addEventListener('click', () => document.getElementById('sidebar').classList.toggle('collapsed'));
        document.getElementById('newChatBtn')?.addEventListener('click', () => chat?.showNewChatPopup());
        document.getElementById('createChatBtn')?.addEventListener('click', () => { const u=document.getElementById('newChatUsername').value.trim(); if(u && chat) chat.createDirectMessage(u); });
        document.getElementById('closePopupBtn')?.addEventListener('click', () => chat?.hideNewChatPopup());
        document.getElementById('mobileMenuBtn')?.addEventListener('click', toggleMobileSidebar);
        
        window.toggleMobileSidebar = toggleMobileSidebar;
        window.addEventListener('resize', () => { clearTimeout(window._rd); window._rd = setTimeout(createFloatingDots, 200); if(window.innerWidth>768) document.getElementById('sidebar').classList.remove('open'); });
    </script>
</body>
</html>
