<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>BLYNKS · Registrierung</title>
    
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23d0ff13'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z'/%3E%3C/svg%3E">
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #080808;
            --surface: #111111;
            --border: #1e1e1e;
            --accent: #c8f135;
            --accent2: #7b61ff;
            --text: #f0f0f0;
            --muted: #555;
            --muted2: #888;
            --neon-green: #d0ff13;
            --error: #ff4d4d;
            --error-bg: rgba(255, 77, 77, 0.1);
            --success: #4caf50;
        }

        html {
            scroll-behavior: smooth;
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(200, 241, 53, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(200, 241, 53, 0.03) 0%, transparent 40%);
            padding: 1rem;
        }

        /* Floating Dots */
        .floating-objects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .floating-dot {
            position: absolute;
            width: clamp(2px, 1vw, 4px);
            height: clamp(2px, 1vw, 4px);
            background-color: var(--accent);
            border-radius: 50%;
            opacity: 0.4;
            filter: blur(1px);
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }

        /* Hauptwrapper */
        .main-wrapper {
            width: 100%;
            max-width: 500px;
            z-index: 10;
            position: relative;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Logo */
        .logo {
            font-family: 'Space Mono', monospace;
            font-size: clamp(2rem, 8vw, 2.8rem);
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--neon-green);
            text-align: center;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px rgba(208, 255, 19, 0.5);
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 10px rgba(200, 241, 53, 0.5); }
            50% { text-shadow: 0 0 20px rgba(200, 241, 53, 0.8); }
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: clamp(1.8rem, 6vw, 2.5rem) clamp(1.5rem, 5vw, 2rem);
            backdrop-filter: blur(2px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover::after {
            transform: scaleX(1);
        }

        /* Step Indicator */
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .step-dot {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .step-dot.active {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 15px rgba(200, 241, 53, 0.3);
        }

        .step-dot.completed {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        /* Register Steps */
        .register-step {
            display: none;
            animation: slideStep 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .register-step.active-step {
            display: block;
        }

        @keyframes slideStep {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .step-header {
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .step-sub {
            font-family: 'Space Mono', monospace;
            color: var(--muted2);
            font-size: clamp(0.7rem, 2.5vw, 0.85rem);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        /* Input Styles */
        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.7rem, 2.5vw, 0.8rem);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted2);
            display: block;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 0 1rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .input-wrapper::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
        }

        .input-wrapper:focus-within::after {
            transform: scaleX(1);
        }

        .input-wrapper.error {
            border-color: var(--error);
        }

        .input-wrapper.valid {
            border-color: var(--success);
        }

        .input-wrapper i {
            color: var(--muted2);
            font-size: 1rem;
            margin-right: 0.75rem;
            transition: color 0.3s ease;
        }

        .input-wrapper:focus-within i {
            color: var(--accent);
        }

        .input-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            padding: clamp(0.8rem, 3vw, 1rem) 0;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: clamp(0.9rem, 3vw, 1rem);
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: #333;
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .error-message {
            color: var(--error);
            font-size: 0.7rem;
            margin-top: 0.5rem;
            display: none;
            font-family: 'Space Mono', monospace;
        }

        .valid-message {
            color: var(--success);
            font-size: 0.7rem;
            margin-top: 0.5rem;
            display: none;
            font-family: 'Space Mono', monospace;
        }

        /* Password Strength */
        .password-strength {
            margin-top: 0.5rem;
            display: flex;
            gap: 0.3rem;
        }

        .strength-bar {
            flex: 1;
            height: 3px;
            background: var(--border);
            transition: all 0.3s;
            border-radius: 2px;
        }

        .strength-bar.weak { background: var(--error); }
        .strength-bar.medium { background: #ff9800; }
        .strength-bar.strong { background: var(--success); }

        .strength-text {
            font-size: 0.65rem;
            margin-top: 0.3rem;
            color: var(--muted2);
            font-family: 'Space Mono', monospace;
        }

        /* Buttons */
        .btn-primary, .btn-secondary {
            padding: clamp(0.8rem, 3vw, 1rem);
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1.5px solid;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .btn-primary:hover:not(:disabled) {
            background: transparent;
            color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(200, 241, 53, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border-color: var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-primary:disabled, .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary.loading {
            color: transparent;
            position: relative;
        }

        .btn-primary.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid var(--bg);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .flex-row {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .flex-row .btn-primary,
        .flex-row .btn-secondary {
            flex: 1;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1rem 0;
            font-size: 0.8rem;
            color: var(--muted2);
        }

        .checkbox-row input {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* Popup */
        .popup-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 1rem;
        }

        .popup {
            background: var(--surface);
            border: 1px solid var(--border);
            max-width: 380px;
            width: 100%;
            pointer-events: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(200, 241, 53, 0.2);
            animation: popupSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .popup::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .popup:hover::after {
            transform: scaleX(1);
        }

        .popup.error::after { background: var(--error); }
        .popup.success::after { background: var(--success); }

        .popup-content {
            padding: clamp(1.5rem, 5vw, 2rem);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .popup-header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .popup-icon {
            width: clamp(40px, 10vw, 48px);
            height: clamp(40px, 10vw, 48px);
            border-radius: 50%;
            background: rgba(200, 241, 53, 0.04);
            border: 1px solid rgba(200, 241, 53, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: clamp(1.2rem, 4vw, 1.5rem);
        }

        .popup.error .popup-icon {
            color: var(--error);
            border-color: rgba(255, 77, 77, 0.3);
        }

        .popup-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            font-weight: 800;
            color: var(--text);
        }

        .popup.error .popup-title { color: var(--error); }

        .popup-message {
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.75rem, 2.5vw, 0.85rem);
            color: var(--muted2);
            line-height: 1.6;
        }

        .popup-buttons {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .popup-btn {
            flex: 1;
            padding: 0.75rem;
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.65rem, 2vw, 0.75rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .popup-btn:hover {
            border-color: var(--accent);
            background: rgba(200, 241, 53, 0.02);
        }

        .popup-btn.primary {
            background: var(--accent);
            color: var(--bg);
            border: none;
        }

        .popup-btn.primary:hover {
            background: #b3d92e;
            transform: translateY(-2px);
        }

        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
        }

        .footer-note a {
            color: var(--accent);
            text-decoration: none;
        }

        @keyframes popupSlide {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @media (max-width: 480px) {
            .card { padding: 1.5rem; }
            .step-dot { width: 35px; height: 35px; font-size: 0.9rem; }
            .flex-row { flex-direction: column; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <div class="floating-objects" id="dotsContainer"></div>

    <div class="popup-container" id="popupContainer" style="display: none;">
        <div class="popup" id="popup">
            <div class="popup-content">
                <div class="popup-header">
                    <div class="popup-icon" id="popupIcon"><i class="fas fa-check-circle"></i></div>
                    <div class="popup-title" id="popupTitle">Erfolg</div>
                </div>
                <div class="popup-message" id="popupMessage"></div>
                <div class="popup-buttons">
                    <button class="popup-btn primary" id="popupConfirm">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="logo">BL<span>Y</span>NKS</div>

        <div class="card">
            <!-- Step Indicator -->
            <div class="step-indicator">
                <span class="step-dot" id="step1Dot">1</span>
                <span class="step-dot" id="step2Dot">2</span>
                <span class="step-dot" id="step3Dot">3</span>
            </div>

            <form id="registerForm">
                <!-- STEP 1: Benutzername -->
                <div class="register-step active-step" id="step1">
                    <div class="step-header">👤 Benutzername</div>
                    <div class="step-sub">Wie möchtest du bei BLYNKS heißen?</div>
                    
                    <div class="input-group">
                        <label>Benutzername</label>
                        <div class="input-wrapper" id="usernameWrapper">
                            <i class="fas fa-at"></i>
                            <input type="text" id="regUsername" placeholder="z.B. lea_style" autocomplete="off">
                        </div>
                        <div class="error-message" id="usernameError"></div>
                        <div class="valid-message" id="usernameValid">
                            <i class="fas fa-check-circle"></i> Verfügbar
                        </div>
                    </div>
                    
                    <div class="flex-row">
                        <button type="button" class="btn-primary" id="step1NextBtn">Weiter <i class="fas fa-arrow-right"></i></button>
                    </div>
                    
                    <div class="info-message" style="margin-top: 1rem; font-size: 0.7rem; color: var(--muted2);">
                        <i class="fas fa-info-circle"></i> 3-50 Zeichen, nur Buchstaben, Zahlen und _
                    </div>
                </div>

                <!-- STEP 2: Passwort -->
                <div class="register-step" id="step2">
                    <div class="step-header">🔐 Passwort</div>
                    <div class="step-sub">Mindestens 8 Zeichen · Sicherheit steht an erster Stelle</div>
                    
                    <div class="input-group">
                        <label>Passwort</label>
                        <div class="input-wrapper" id="passwordWrapper">
                            <i class="fas fa-key"></i>
                            <input type="password" id="regPassword" placeholder="••••••••">
                            <i class="fas fa-eye" id="togglePassword" style="cursor: pointer; margin-left: auto;"></i>
                        </div>
                        <div class="error-message" id="passwordError"></div>
                        <div class="password-strength" id="passwordStrength">
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                        </div>
                        <div class="strength-text" id="strengthText"></div>
                    </div>
                    
                    <div class="input-group">
                        <label>Passwort bestätigen</label>
                        <div class="input-wrapper" id="confirmWrapper">
                            <i class="fas fa-check-circle"></i>
                            <input type="password" id="regPasswordConfirm" placeholder="••••••••">
                        </div>
                        <div class="error-message" id="confirmError"></div>
                    </div>
                    
                    <div class="flex-row">
                        <button type="button" class="btn-secondary" id="step2BackBtn"><i class="fas fa-arrow-left"></i> Zurück</button>
                        <button type="button" class="btn-primary" id="step2NextBtn">Weiter <i class="fas fa-arrow-right"></i></button>
                    </div>
                </div>

                <!-- STEP 3: E-Mail & AGB -->
                <div class="register-step" id="step3">
                    <div class="step-header">✉️ E-Mail</div>
                    <div class="step-sub">Für Benachrichtigungen · Optional aber empfohlen</div>
                    
                    <div class="input-group">
                        <label>E-Mail-Adresse <span class="optional-tag" style="font-size:0.7rem; color:var(--muted);">optional</span></label>
                        <div class="input-wrapper" id="emailWrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="regEmail" placeholder="max@example.com">
                        </div>
                        <div class="error-message" id="emailError"></div>
                    </div>

                    <div class="checkbox-row">
                        <input type="checkbox" id="agreeTerms">
                        <label for="agreeTerms">Ich akzeptiere die AGB und Datenschutzrichtlinien</label>
                    </div>
                    <div class="error-message" id="termsError"></div>

                    <div class="flex-row">
                        <button type="button" class="btn-secondary" id="step3BackBtn"><i class="fas fa-arrow-left"></i> Zurück</button>
                        <button type="submit" class="btn-primary" id="registerBtn">Registrieren <i class="fas fa-rocket"></i></button>
                    </div>
                </div>
            </form>

            <div class="footer-note">
                <span>Bereits Mitglied? </span>
                <a href="/login.html">Jetzt anmelden</a>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        // ============ FLOATING DOTS ============
        function createFloatingDots() {
            const container = document.getElementById('dotsContainer');
            if (!container) return;
            while (container.firstChild) container.removeChild(container.firstChild);
            
            const isMobile = window.innerWidth <= 768;
            const dotCount = isMobile ? 25 : 40;
            
            for (let i = 0; i < dotCount; i++) {
                const dot = document.createElement('div');
                dot.className = 'floating-dot';
                dot.style.left = `${Math.random() * 100}%`;
                dot.style.bottom = `${-5}%`;
                dot.style.animationDelay = `${Math.random() * 20}s`;
                dot.style.animationDuration = `${15 + Math.random() * 10}s`;
                const size = isMobile ? Math.random() * 3 + 1 : Math.random() * 4 + 1;
                dot.style.width = `${size}px`;
                dot.style.height = `${size}px`;
                container.appendChild(dot);
            }
        }

        // ============ POPUP ============
        function showPopup(type, title, message, callback) {
            const container = document.getElementById('popupContainer');
            const popup = document.getElementById('popup');
            const icon = document.getElementById('popupIcon');
            const titleEl = document.getElementById('popupTitle');
            const messageEl = document.getElementById('popupMessage');
            const confirmBtn = document.getElementById('popupConfirm');
            
            popup.className = 'popup';
            popup.classList.add(type);
            
            if (type === 'error') {
                icon.innerHTML = '<i class="fas fa-exclamation-circle"></i>';
                titleEl.textContent = title || 'Fehler';
            } else if (type === 'success') {
                icon.innerHTML = '<i class="fas fa-check-circle"></i>';
                titleEl.textContent = title || 'Erfolg';
            } else {
                icon.innerHTML = '<i class="fas fa-info-circle"></i>';
                titleEl.textContent = title || 'Hinweis';
            }
            
            messageEl.textContent = message;
            
            confirmBtn.onclick = function() {
                container.style.display = 'none';
                if (callback) callback();
            };
            
            container.style.display = 'flex';
        }

        // ============ STEP NAVIGATION ============
        let currentStep = 1;
        
        function showStep(step) {
            document.querySelectorAll('.register-step').forEach(el => el.classList.remove('active-step'));
            document.getElementById(`step${step}`).classList.add('active-step');
            
            for (let i = 1; i <= 3; i++) {
                const dot = document.getElementById(`step${i}Dot`);
                if (i < step) {
                    dot.classList.add('completed');
                    dot.classList.remove('active');
                } else if (i === step) {
                    dot.classList.add('active');
                    dot.classList.remove('completed');
                } else {
                    dot.classList.remove('active', 'completed');
                }
            }
            currentStep = step;
        }

        // ============ PASSWORT-STÄRKE ============
        function calculatePasswordStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            return Math.min(strength, 3);
        }

        function updatePasswordStrength() {
            const password = document.getElementById('regPassword').value;
            const strength = calculatePasswordStrength(password);
            const bars = document.querySelectorAll('.strength-bar');
            const strengthText = document.getElementById('strengthText');
            
            bars.forEach((bar, i) => {
                bar.className = 'strength-bar';
                if (i < strength) {
                    if (strength === 1) bar.classList.add('weak');
                    else if (strength === 2) bar.classList.add('medium');
                    else if (strength >= 3) bar.classList.add('strong');
                }
            });
            
            if (password.length === 0) {
                strengthText.textContent = '';
            } else if (strength === 1) {
                strengthText.textContent = '⚠️ Schwaches Passwort';
                strengthText.style.color = '#ff4d4d';
            } else if (strength === 2) {
                strengthText.textContent = '⚡ Mittlere Stärke';
                strengthText.style.color = '#ff9800';
            } else {
                strengthText.textContent = '✅ Starkes Passwort';
                strengthText.style.color = '#4caf50';
            }
        }

        // ============ VALIDIERUNG ============
        function validateStep1() {
            const username = document.getElementById('regUsername').value.trim();
            const errorEl = document.getElementById('usernameError');
            const wrapper = document.getElementById('usernameWrapper');
            const validEl = document.getElementById('usernameValid');
            
            if (!username) {
                errorEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> Bitte gib einen Benutzernamen ein';
                errorEl.style.display = 'block';
                wrapper.classList.add('error');
                validEl.style.display = 'none';
                return false;
            }
            if (username.length < 3) {
                errorEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> Benutzername muss mindestens 3 Zeichen lang sein';
                errorEl.style.display = 'block';
                wrapper.classList.add('error');
                validEl.style.display = 'none';
                return false;
            }
            if (username.length > 50) {
                errorEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> Benutzername darf maximal 50 Zeichen lang sein';
                errorEl.style.display = 'block';
                wrapper.classList.add('error');
                validEl.style.display = 'none';
                return false;
            }
            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                errorEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> Benutzername darf nur Buchstaben, Zahlen und Unterstriche enthalten';
                errorEl.style.display = 'block';
                wrapper.classList.add('error');
                validEl.style.display = 'none';
                return false;
            }
            
            errorEl.style.display = 'none';
            wrapper.classList.remove('error');
            validEl.style.display = 'block';
            return true;
        }

        function validateStep2() {
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regPasswordConfirm').value;
            const passwordError = document.getElementById('passwordError');
            const confirmError = document.getElementById('confirmError');
            const passwordWrapper = document.getElementById('passwordWrapper');
            const confirmWrapper = document.getElementById('confirmWrapper');
            let isValid = true;
            
            if (!password) {
                passwordError.innerHTML = '<i class="fas fa-exclamation-circle"></i> Bitte gib ein Passwort ein';
                passwordError.style.display = 'block';
                passwordWrapper.classList.add('error');
                isValid = false;
            } else if (password.length < 8) {
                passwordError.innerHTML = '<i class="fas fa-exclamation-circle"></i> Passwort muss mindestens 8 Zeichen lang sein';
                passwordError.style.display = 'block';
                passwordWrapper.classList.add('error');
                isValid = false;
            } else {
                passwordError.style.display = 'none';
                passwordWrapper.classList.remove('error');
            }
            
            if (!confirm) {
                confirmError.innerHTML = '<i class="fas fa-exclamation-circle"></i> Bitte bestätige dein Passwort';
                confirmError.style.display = 'block';
                confirmWrapper.classList.add('error');
                isValid = false;
            } else if (password !== confirm) {
                confirmError.innerHTML = '<i class="fas fa-exclamation-circle"></i> Die Passwörter stimmen nicht überein';
                confirmError.style.display = 'block';
                confirmWrapper.classList.add('error');
                isValid = false;
            } else {
                confirmError.style.display = 'none';
                confirmWrapper.classList.remove('error');
            }
            
            return isValid;
        }

        function validateStep3() {
            const email = document.getElementById('regEmail').value.trim();
            const terms = document.getElementById('agreeTerms').checked;
            const emailError = document.getElementById('emailError');
            const termsError = document.getElementById('termsError');
            const emailWrapper = document.getElementById('emailWrapper');
            let isValid = true;
            
            if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                emailError.innerHTML = '<i class="fas fa-exclamation-circle"></i> Bitte gib eine gültige E-Mail-Adresse ein';
                emailError.style.display = 'block';
                emailWrapper.classList.add('error');
                isValid = false;
            } else {
                emailError.style.display = 'none';
                emailWrapper.classList.remove('error');
            }
            
            if (!terms) {
                termsError.innerHTML = '<i class="fas fa-exclamation-circle"></i> Du musst die AGB und Datenschutzrichtlinien akzeptieren';
                termsError.style.display = 'block';
                isValid = false;
            } else {
                termsError.style.display = 'none';
            }
            
            return isValid;
        }

        // ============ EVENT LISTENER ============
        
        // Passwort anzeigen/verstecken
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('regPassword');
        if (togglePassword) {
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        }
        
        // Live-Passwort-Stärke
        passwordInput.addEventListener('input', updatePasswordStrength);
        
        // Live-Benutzername Validierung
        const usernameInput = document.getElementById('regUsername');
        usernameInput.addEventListener('input', function() {
            const validEl = document.getElementById('usernameValid');
            const errorEl = document.getElementById('usernameError');
            const wrapper = document.getElementById('usernameWrapper');
            
            if (this.value.length >= 3 && /^[a-zA-Z0-9_]+$/.test(this.value)) {
                validEl.style.display = 'block';
                errorEl.style.display = 'none';
                wrapper.classList.remove('error');
            } else {
                validEl.style.display = 'none';
            }
        });
        
        // Live-Passwort-Bestätigung
        const confirmInput = document.getElementById('regPasswordConfirm');
        confirmInput.addEventListener('input', function() {
            const password = document.getElementById('regPassword').value;
            const errorEl = document.getElementById('confirmError');
            const wrapper = document.getElementById('confirmWrapper');
            
            if (this.value === password && password.length >= 8) {
                errorEl.style.display = 'none';
                wrapper.classList.remove('error');
            }
        });
        
        // Step Navigation
        document.getElementById('step1NextBtn').addEventListener('click', () => {
            if (validateStep1()) showStep(2);
        });
        
        document.getElementById('step2BackBtn').addEventListener('click', () => showStep(1));
        
        document.getElementById('step2NextBtn').addEventListener('click', () => {
            if (validateStep2()) showStep(3);
        });
        
        document.getElementById('step3BackBtn').addEventListener('click', () => showStep(2));
        
        // Enter-Taste
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (currentStep === 1 && validateStep1()) showStep(2);
                else if (currentStep === 2 && validateStep2()) showStep(3);
            }
        });
        
        // Formular Submit
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!validateStep3()) return;
            
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const registerBtn = document.getElementById('registerBtn');
            
            registerBtn.classList.add('loading');
            registerBtn.disabled = true;
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                
                if (response.status === 429) {
                    showPopup('error', 'Zu viele Versuche', 'Bitte warte eine Stunde, bevor du es erneut versuchst.');
                } else if (data.success) {
                    showPopup('success', 'Registrierung erfolgreich!', 
                        `Willkommen bei BLYNKS, ${username}! Du wirst nun zum Login weitergeleitet.`,
                        () => { window.location.href = '/login.html'; }
                    );
                } else {
                    let errorMsg = data.error || 'Ein Fehler ist aufgetreten.';
                    if (errorMsg.includes('Benutzername') || errorMsg.includes('bereits vergeben')) {
                        errorMsg = 'Dieser Benutzername ist bereits vergeben. Bitte wähle einen anderen.';
                        showStep(1);
                    } else if (errorMsg.includes('E-Mail')) {
                        errorMsg = 'Diese E-Mail-Adresse wird bereits verwendet.';
                    }
                    showPopup('error', 'Registrierung fehlgeschlagen', errorMsg);
                }
            } catch (err) {
                console.error('Registrierungsfehler:', err);
                showPopup('error', 'Verbindungsfehler', 'Der Server ist nicht erreichbar. Bitte versuche es später erneut.');
            } finally {
                registerBtn.classList.remove('loading');
                registerBtn.disabled = false;
            }
        });
        
        // Initialisierung
        window.addEventListener('load', () => {
            createFloatingDots();
            window.showPopup = showPopup;
        });
        
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(createFloatingDots, 200);
        });
    </script>
</body>
</html>
