<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BLYNKS · Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #080808;
            --surface: #111;
            --border: #1e1e1e;
            --accent: #c8f135;
            --accent-glow: rgba(200,241,53,0.3);
            --text: #f0f0f0;
            --text-muted: #888;
            --error: #ff4d4d;
            --success: #4caf50;
            --support-bg: #0a1a0a;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            background-image: radial-gradient(circle at 10% 20%, rgba(200,241,53,0.03) 0%, transparent 40%);
        }
        .app { min-height: 100vh; background: rgba(0,0,0,0.3); backdrop-filter: blur(2px); padding-top: 44px; }
        
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2rem; backdrop-filter: blur(10px); z-index: 100;
            background: rgba(0,0,0,0.95);
        }
        .logo { font-family: 'Space Mono', monospace; font-size: 1.2rem; font-weight: 700; letter-spacing: 0.3em; color: var(--accent); }
        .user-info { display: flex; align-items: center; gap: 1rem; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #1e1e1e; display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--accent); border: 2px solid var(--accent); }
        .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 0.4rem 1rem; border-radius: 30px; cursor: pointer; font-family: 'Space Mono', monospace; font-size: 0.7rem; }
        .logout-btn:hover { border-color: var(--accent); color: var(--accent); }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 1rem; border-radius: 16px; }
        .stat-card h3 { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; }
        .stat-card .value { font-size: 1.6rem; font-weight: 800; color: var(--accent); }
        
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; flex-wrap: wrap; }
        .tab-btn { background: transparent; border: none; color: var(--text-muted); padding: 0.6rem 1.2rem; font-family: 'Space Mono', monospace; font-size: 0.8rem; cursor: pointer; border-radius: 30px; }
        .tab-btn:hover { color: var(--accent); }
        .tab-btn.active { background: var(--accent); color: var(--bg); }
        
        .table-container { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.8rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-family: 'Space Mono', monospace; font-size: 0.7rem; text-transform: uppercase; }
        tr:hover { background: rgba(200,241,53,0.05); }
        
        .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.7rem; }
        .badge.admin { background: var(--accent); color: var(--bg); }
        .badge.banned { background: var(--error); color: #fff; }
        .badge.support { background: #2a6e2a; color: #fff; }
        
        button { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.4rem 0.8rem; border-radius: 30px; cursor: pointer; font-family: 'Space Mono', monospace; font-size: 0.7rem; margin: 0 0.2rem; }
        button:hover { border-color: var(--accent); color: var(--accent); }
        button.primary { background: var(--accent); color: var(--bg); border: none; }
        button.danger { border-color: var(--error); color: var(--error); }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--surface); border: 1px solid var(--accent); border-radius: 24px; padding: 1.5rem; max-width: 450px; width: 90%; }
        .modal-content h3 { color: var(--accent); margin-bottom: 1rem; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 0.7rem; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 12px; margin-bottom: 1rem; outline: none; }
        
        /* Support Chat Styles */
        .support-chat-view { background: var(--surface); border: 1px solid var(--accent); border-radius: 16px; margin-top: 1rem; overflow: hidden; }
        .support-header { background: linear-gradient(135deg, #1a2a1a, #0a1a0a); padding: 1rem; border-bottom: 1px solid var(--accent); display: flex; align-items: center; gap: 1rem; }
        .support-logo { width: 40px; height: 40px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--bg); }
        .support-title { flex: 1; }
        .support-title h3 { color: var(--accent); font-size: 1rem; margin-bottom: 0.2rem; }
        .support-title p { font-size: 0.7rem; color: var(--text-muted); }
        .support-close { background: transparent; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; }
        .support-close:hover { color: var(--error); }
        
        .support-messages { height: 350px; overflow-y: auto; padding: 1rem; background: var(--bg); }
        .support-message { display: flex; margin-bottom: 1rem; }
        .support-message.admin { justify-content: flex-end; }
        .support-message .avatar { width: 35px; height: 35px; border-radius: 50%; background: #1e1e1e; display: flex; align-items: center; justify-content: center; margin-right: 0.8rem; flex-shrink: 0; }
        .support-message.admin .avatar { margin-right: 0; margin-left: 0.8rem; background: var(--accent); color: var(--bg); }
        .support-message .bubble { background: var(--surface); padding: 0.6rem 1rem; border-radius: 18px; max-width: 70%; border: 1px solid var(--border); }
        .support-message.admin .bubble { background: var(--accent); color: var(--bg); border: none; }
        .support-message .name { font-size: 0.65rem; color: var(--accent); margin-bottom: 0.2rem; }
        .support-message.admin .name { color: var(--bg); }
        .support-message .time { font-size: 0.55rem; color: var(--text-muted); margin-top: 0.2rem; }
        
        .support-input-area { padding: 1rem; border-top: 1px solid var(--border); display: flex; gap: 0.5rem; background: var(--surface); }
        .support-input-area input { flex: 1; padding: 0.7rem; background: var(--bg); border: 1px solid var(--border); border-radius: 30px; color: var(--text); outline: none; }
        .support-input-area button { background: var(--accent); color: var(--bg); border: none; padding: 0.5rem 1.2rem; border-radius: 30px; cursor: pointer; }
        
        @media (max-width: 768px) { .container { padding: 1rem; } th, td { padding: 0.5rem; font-size: 0.75rem; } .support-message .bubble { max-width: 85%; } }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <div class="logo">BLYNKS · ADMIN</div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">?</div>
                <span id="userName">Laden...</span>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Exit</button>
            </div>
        </div>
        
        <div class="container">
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card"><h3>Benutzer</h3><div class="value" id="statUsers">0</div></div>
                <div class="stat-card"><h3>Online</h3><div class="value" id="statOnline">0</div></div>
                <div class="stat-card"><h3>Chats</h3><div class="value" id="statChats">0</div></div>
                <div class="stat-card"><h3>Nachrichten</h3><div class="value" id="statMessages">0</div></div>
                <div class="stat-card"><h3>Support</h3><div class="value" id="statSupport">0</div></div>
            </div>
            
            <div class="tabs">
                <button class="tab-btn active" data-tab="users">👥 Benutzer</button>
                <button class="tab-btn" data-tab="support">💬 Support-Chats</button>
                <button class="tab-btn" data-tab="push">📢 Push</button>
            </div>
            
            <!-- Benutzer Tab -->
            <div id="tab-users">
                <div style="margin-bottom: 1rem;">
                    <button class="primary" onclick="showCreateUserModal()"><i class="fas fa-plus"></i> Benutzer erstellen</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Benutzer</th><th>E-Mail</th><th>Status</th><th>Aktionen</th></tr></thead>
                        <tbody id="userTableBody"></tbody>
                    </table>
                </div>
            </div>
            
            <!-- Support Tab -->
            <div id="tab-support" style="display: none;">
                <div class="table-container">
                    <table>
                        <thead><tr><th>Benutzer</th><th>Letzte Nachricht</th><th>Letzte Aktivität</th><th>Aktion</th></tr></thead>
                        <tbody id="supportChatsBody"></tbody>
                    </table>
                </div>
                <div id="supportChatView" class="support-chat-view" style="display: none;">
                    <div class="support-header">
                        <div class="support-logo"><i class="fas fa-headset"></i></div>
                        <div class="support-title">
                            <h3>BLYNKS Support</h3>
                            <p>Chat mit <span id="supportUserName"></span></p>
                        </div>
                        <button class="support-close" onclick="closeSupportChat()"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="support-messages" id="supportMessages"></div>
                    <div class="support-input-area">
                        <input type="text" id="supportMessageInput" placeholder="Nachricht schreiben...">
                        <button onclick="sendSupportMessage()"><i class="fas fa-paper-plane"></i> Senden</button>
                    </div>
                </div>
            </div>
            
            <!-- Push Tab -->
            <div id="tab-push" style="display: none;">
                <div class="table-container">
                    <table>
                        <thead><tr><th>Benutzer</th><th>Status</th><th>Aktion</th></tr></thead>
                        <tbody id="pushUserTableBody"></tbody>
                    </table>
                </div>
                <div id="pushForm" style="display: none; margin-top: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1rem;">
                    <h3 style="color: var(--accent);">💬 BLYNKS Support Push</h3>
                    <p style="font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.5rem;">Nachricht an <span id="pushTargetName"></span></p>
                    <input type="text" id="pushTitle" placeholder="Titel" style="width: 100%; margin-bottom: 0.5rem;">
                    <textarea id="pushMessage" placeholder="Nachricht" rows="3" style="width: 100%; margin-bottom: 0.5rem;"></textarea>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="primary" onclick="sendPush()"><i class="fas fa-bell"></i> Senden</button>
                        <button onclick="closePushForm()">Abbrechen</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="userModal" class="modal">
        <div class="modal-content">
            <h3 id="userModalTitle">Benutzer erstellen</h3>
            <input type="text" id="modalUsername" placeholder="Benutzername">
            <input type="email" id="modalEmail" placeholder="E-Mail">
            <input type="password" id="modalPassword" placeholder="Passwort">
            <div style="margin-bottom: 1rem;">
                <label><input type="checkbox" id="modalIsAdmin"> Admin-Rechte</label>
            </div>
            <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                <button class="primary" id="modalSaveBtn">Speichern</button>
                <button onclick="closeUserModal()">Abbrechen</button>
            </div>
        </div>
    </div>
    
    <script src="/js/auth.js"></script>
    <script>
        let currentUser = null;
        let selectedPushUserId = null;
        let currentSupportChatId = null;
        let supportPollingInterval = null;
        
        async function loadStats() {
            try {
                const res = await fetch('/api/admin/stats', { credentials: 'include' });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('statUsers').textContent = data.stats.totalUsers;
                    document.getElementById('statOnline').textContent = data.stats.onlineUsers;
                    document.getElementById('statChats').textContent = data.stats.totalChats;
                    document.getElementById('statMessages').textContent = data.stats.totalMessages;
                    document.getElementById('statSupport').textContent = data.stats.openSupport || 0;
                }
            } catch(e) { console.error(e); }
        }
        
        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users', { credentials: 'include' });
                const data = await res.json();
                if (data.success) renderUserTable(data.users);
            } catch(e) { console.error(e); }
        }
        
        function renderUserTable(users) {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';
            users.forEach(user => {
                const isRoot = user.username === 'Jojo';
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td><strong>${escapeHtml(user.username)}</strong><br><small style="color:#888">${user.user_id.substring(0, 8)}</small></td>
                    <td>${user.email || '-'}</td>
                    <td>
                        ${user.is_admin ? '<span class="badge admin">Admin</span>' : ''}
                        ${user.is_banned ? '<span class="badge banned">Gesperrt</span>' : ''}
                    </td>
                    <td>
                        <button onclick="editUser('${user.user_id}')" ${isRoot ? 'disabled' : ''}><i class="fas fa-edit"></i></button>
                        <button onclick="banUser('${user.user_id}')" ${isRoot || user.is_banned ? 'disabled' : ''}><i class="fas fa-ban"></i></button>
                        <button onclick="unbanUser('${user.user_id}')" ${!user.is_banned || isRoot ? 'disabled' : ''}><i class="fas fa-check"></i></button>
                        <button onclick="deleteUser('${user.user_id}')" class="danger" ${isRoot ? 'disabled' : ''}><i class="fas fa-trash"></i></button>
                    </td>
                `;
            });
        }
        
        // ============ SUPPORT-CHAT ============
        
        async function loadSupportChats() {
            try {
                const res = await fetch('/api/admin/support/chats', { credentials: 'include' });
                const data = await res.json();
                if (data.success) renderSupportChats(data.chats);
            } catch(e) { console.error(e); }
        }
        
        function renderSupportChats(chats) {
            const tbody = document.getElementById('supportChatsBody');
            tbody.innerHTML = '';
            chats.forEach(chat => {
                const row = tbody.insertRow();
                const lastMsg = chat.last_message ? chat.last_message.substring(0, 40) : 'Keine Nachrichten';
                const time = chat.last_message_time ? new Date(chat.last_message_time).toLocaleString() : '-';
                row.innerHTML = `
                    <td><strong>${escapeHtml(chat.username)}</strong><br><small>${chat.user_id.substring(0, 8)}</small></td>
                    <td>${escapeHtml(lastMsg)}${lastMsg.length > 40 ? '...' : ''}</td>
                    <td>${time}</td>
                    <td><button onclick="openSupportChat('${chat.id}', '${escapeHtml(chat.username)}')" class="primary"><i class="fas fa-comment"></i> Antworten</button></td>
                `;
            });
        }
        
        async function openSupportChat(chatId, username) {
            currentSupportChatId = chatId;
            document.getElementById('supportUserName').textContent = username;
            document.getElementById('supportChatView').style.display = 'block';
            await loadSupportMessages();
            
            if (supportPollingInterval) clearInterval(supportPollingInterval);
            supportPollingInterval = setInterval(loadSupportMessages, 3000);
        }
        
        async function loadSupportMessages() {
            if (!currentSupportChatId) return;
            try {
                const res = await fetch(`/api/admin/support/chats/${currentSupportChatId}/messages`, { credentials: 'include' });
                const data = await res.json();
                if (data.success) renderSupportMessages(data.messages);
            } catch(e) { console.error(e); }
        }
        
        function renderSupportMessages(messages) {
            const container = document.getElementById('supportMessages');
            container.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `support-message ${msg.isAdmin ? 'admin' : ''}`;
                const time = new Date(msg.createdAt).toLocaleTimeString();
                div.innerHTML = `
                    <div class="avatar">${msg.isAdmin ? '<i class="fas fa-headset"></i>' : msg.username.charAt(0)}</div>
                    <div class="bubble">
                        <div class="name">${msg.isAdmin ? 'BLYNKS Support' : escapeHtml(msg.username)}</div>
                        <div>${escapeHtml(msg.message)}</div>
                        <div class="time">${time}</div>
                    </div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }
        
        async function sendSupportMessage() {
            const input = document.getElementById('supportMessageInput');
            const message = input.value.trim();
            if (!message || !currentSupportChatId) return;
            
            try {
                const res = await fetch(`/api/admin/support/chats/${currentSupportChatId}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                if (data.success) {
                    input.value = '';
                    await loadSupportMessages();
                    await loadSupportChats();
                }
            } catch(e) { console.error(e); }
        }
        
        function closeSupportChat() {
            if (supportPollingInterval) clearInterval(supportPollingInterval);
            currentSupportChatId = null;
            document.getElementById('supportChatView').style.display = 'none';
            loadSupportChats();
        }
        
        // ============ PUSH ============
        
        function loadPushUsers() {
            fetch('/api/admin/users', { credentials: 'include' })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        const tbody = document.getElementById('pushUserTableBody');
                        tbody.innerHTML = '';
                        data.users.forEach(user => {
                            const row = tbody.insertRow();
                            row.innerHTML = `
                                <td><strong>${escapeHtml(user.username)}</strong></td>
                                <td>${user.is_banned ? '<span class="badge banned">Gesperrt</span>' : '<span class="badge">Aktiv</span>'}</td>
                                <td><button onclick="showPushForm('${user.user_id}', '${escapeHtml(user.username)}')"><i class="fas fa-bell"></i> Push</button></td>
                            `;
                        });
                    }
                });
        }
        
        function showPushForm(userId, username) {
            selectedPushUserId = userId;
            document.getElementById('pushTargetName').textContent = username;
            document.getElementById('pushTitle').value = '';
            document.getElementById('pushMessage').value = '';
            document.getElementById('pushForm').style.display = 'block';
        }
        
        function closePushForm() {
            selectedPushUserId = null;
            document.getElementById('pushForm').style.display = 'none';
        }
        
        async function sendPush() {
            const title = document.getElementById('pushTitle').value.trim();
            const message = document.getElementById('pushMessage').value.trim();
            
            if (!title || !message) { alert('Bitte Titel und Nachricht eingeben'); return; }
            
            try {
                const res = await fetch('/api/admin/push/send', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
                    body: JSON.stringify({ userId: selectedPushUserId, title, message })
                });
                const data = await res.json();
                if (data.success) { alert('Push gesendet!'); closePushForm(); }
                else alert(data.message || 'Fehler');
            } catch(e) { alert('Fehler'); }
        }
        
        // ============ BENUTZERVERWALTUNG ============
        
        function showCreateUserModal() {
            document.getElementById('userModalTitle').textContent = 'Benutzer erstellen';
            document.getElementById('modalUsername').value = '';
            document.getElementById('modalEmail').value = '';
            document.getElementById('modalPassword').value = '';
            document.getElementById('modalIsAdmin').checked = false;
            document.getElementById('modalSaveBtn').onclick = () => createUser();
            document.getElementById('userModal').style.display = 'flex';
        }
        
        async function createUser() {
            const username = document.getElementById('modalUsername').value.trim();
            const email = document.getElementById('modalEmail').value.trim();
            const password = document.getElementById('modalPassword').value;
            const isAdmin = document.getElementById('modalIsAdmin').checked;
            
            if (!username || username.length < 3) { alert('Benutzername mind. 3 Zeichen'); return; }
            if (!password || password.length < 8) { alert('Passwort mind. 8 Zeichen'); return; }
            
            try {
                const res = await fetch('/api/admin/users', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
                    body: JSON.stringify({ username, email, password, is_admin: isAdmin })
                });
                const data = await res.json();
                if (data.success) { closeUserModal(); loadUsers(); loadStats(); }
                else alert(data.error);
            } catch(e) { alert('Fehler'); }
        }
        
        async function editUser(userId) {
            try {
                const res = await fetch(`/api/admin/users/${userId}`, { credentials: 'include' });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('userModalTitle').textContent = 'Benutzer bearbeiten';
                    document.getElementById('modalUsername').value = data.user.username;
                    document.getElementById('modalEmail').value = data.user.email || '';
                    document.getElementById('modalPassword').value = '';
                    document.getElementById('modalIsAdmin').checked = data.user.is_admin === 1;
                    document.getElementById('modalSaveBtn').onclick = () => updateUser(userId);
                    document.getElementById('userModal').style.display = 'flex';
                }
            } catch(e) { alert('Fehler'); }
        }
        
        async function updateUser(userId) {
            const username = document.getElementById('modalUsername').value.trim();
            const email = document.getElementById('modalEmail').value.trim();
            const isAdmin = document.getElementById('modalIsAdmin').checked;
            const password = document.getElementById('modalPassword').value;
            
            const data = { username, email, is_admin: isAdmin };
            if (password) data.password = password;
            
            try {
                const res = await fetch(`/api/admin/users/${userId}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) { closeUserModal(); loadUsers(); }
                else alert(result.error);
            } catch(e) { alert('Fehler'); }
        }
        
        async function banUser(userId) {
            if (!confirm('Benutzer sperren?')) return;
            try {
                const res = await fetch(`/api/admin/users/${userId}/ban`, { method: 'POST', credentials: 'include' });
                const data = await res.json();
                if (data.success) loadUsers();
                else alert(data.error);
            } catch(e) { alert('Fehler'); }
        }
        
        async function unbanUser(userId) {
            try {
                const res = await fetch(`/api/admin/users/${userId}/unban`, { method: 'POST', credentials: 'include' });
                const data = await res.json();
                if (data.success) loadUsers();
                else alert(data.error);
            } catch(e) { alert('Fehler'); }
        }
        
        async function deleteUser(userId) {
            if (!confirm('Benutzer unwiderruflich löschen?')) return;
            try {
                const res = await fetch(`/api/admin/users/${userId}`, { method: 'DELETE', credentials: 'include' });
                const data = await res.json();
                if (data.success) { loadUsers(); loadStats(); }
                else alert(data.error);
            } catch(e) { alert('Fehler'); }
        }
        
        function closeUserModal() { document.getElementById('userModal').style.display = 'none'; }
        
        function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function logout() { window.auth.logout(); }
        
        document.addEventListener('DOMContentLoaded', async () => {
            await window.auth.checkSession();
            if (!window.auth.isAuthenticated()) { window.location.href = '/login.html'; return; }
            const user = await window.auth.getCurrentUser();
            if (!user || !user.is_admin) { alert('Keine Admin-Rechte!'); window.location.href = '/dashboard.html'; return; }
            document.getElementById('userName').textContent = user.username;
            document.getElementById('userAvatar').textContent = user.username.charAt(0);
            
            await loadStats();
            await loadUsers();
            await loadSupportChats();
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('tab-users').style.display = btn.dataset.tab === 'users' ? 'block' : 'none';
                    document.getElementById('tab-support').style.display = btn.dataset.tab === 'support' ? 'block' : 'none';
                    document.getElementById('tab-push').style.display = btn.dataset.tab === 'push' ? 'block' : 'none';
                    if (btn.dataset.tab === 'support') loadSupportChats();
                    if (btn.dataset.tab === 'push') loadPushUsers();
                });
            });
        });
    </script>
</body>
</html>
