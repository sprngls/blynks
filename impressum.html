<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressum • Blynks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #080808;
            --bg-darker: #050505;
            --text: #e9e9e9;
            --muted: #909090;
            --neon-green: #d0ff13;
            --neon-green-dark: #a6cc10;
            --border: #222;
            --card-bg: #111111;
            --radius: 16px;
            --radius-sm: 10px;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(208, 255, 19, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(208, 255, 19, 0.03) 0%, transparent 40%);
        }
        
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* Header */
        header {
            padding: 20px 0;
            text-align: center;
        }
        
        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(208, 255, 19, 0.5);
            animation: pulse 3s infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                text-shadow: 0 0 10px rgba(208, 255, 19, 0.5);
            }
            50% {
                text-shadow: 0 0 20px rgba(208, 255, 19, 0.8);
            }
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px 80px;
            width: 100%;
        }
        
        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 60px;
            animation: slideUp 0.8s ease-out;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: var(--card-bg);
            border: 1px solid rgba(208, 255, 19, 0.3);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--neon-green);
        }
        
        .title {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 20px;
            color: var(--text);
            position: relative;
        }
        
        .title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            height: 4px;
            width: 100px;
            background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: var(--muted);
            max-width: 600px;
            margin: 25px auto 0;
        }
        
        /* Content Card */
        .content-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            animation: fadeIn 1s ease-out;
        }
        
        /* Information Section */
        .info-section {
            margin-bottom: 50px;
        }
        
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--neon-green);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-icon {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(208, 255, 19, 0.15);
            border-radius: 12px;
            font-size: 1.4rem;
            color: var(--neon-green);
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .info-item {
            background-color: rgba(17, 17, 17, 0.7);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 25px;
            transition: all 0.3s ease;
        }
        
        .info-item:hover {
            transform: translateY(-5px);
            border-color: var(--neon-green);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .info-heading {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .info-icon {
            font-size: 1.2rem;
            color: var(--neon-green);
        }
        
        .info-content {
            color: var(--muted);
            line-height: 1.6;
        }
        
        /* Contact Items */
        .contact-items {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .contact-item {
            background-color: rgba(17, 17, 17, 0.7);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }
        
        .contact-item:hover {
            transform: translateX(10px);
            border-color: var(--neon-green);
            background-color: rgba(208, 255, 19, 0.05);
        }
        
        .contact-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(208, 255, 19, 0.15);
            color: var(--neon-green);
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        
        .contact-content {
            flex: 1;
        }
        
        .contact-label {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 5px;
        }
        
        .contact-value {
            color: var(--muted);
        }
        
        /* Legal Section */
        .legal-section p, .legal-section ul {
            color: var(--muted);
            margin-bottom: 15px;
            font-size: 1rem;
        }
        
        .legal-section ul {
            margin-left: 20px;
        }
        
        .legal-section li {
            margin-bottom: 8px;
        }
        
        /* Back Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 50px;
            padding: 16px 30px;
            background-color: rgba(208, 255, 19, 0.15);
            border: 1px solid rgba(208, 255, 19, 0.4);
            border-radius: var(--radius);
            color: var(--neon-green);
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }
        
        .back-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            border-color: var(--neon-green);
            color: var(--text);
            text-decoration: none;
        }
        
        /* Floating objects */
        .floating-objects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
        
        .floating-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: var(--neon-green);
            border-radius: 50%;
            opacity: 0.4;
            filter: blur(1px);
            animation: float 20s linear infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }
        
        /* Cursor */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 30px;
            background-color: var(--neon-green);
            margin-left: 5px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }
        
        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }
        
        /* Animation keyframes */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }
            
            .content-card {
                padding: 30px 20px;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 480px) {
            .title {
                font-size: 2rem;
            }
            
            .section-title {
                font-size: 1.5rem;
            }
            
            .contact-item {
                flex-direction: column;
                align-items: flex-start;
                text-align: left;
            }
            
            .contact-icon {
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="floating-objects" id="dots-container"></div>
        
        <!-- Header -->
        <header>
            <div class="logo">Blynks</div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Hero -->
            <div class="hero">
                <div class="badge">
                    <i class="fas fa-balance-scale"></i> Rechtliche Informationen
                </div>
                <h1 class="title">Impressum<span class="cursor"></span></h1>
            </div>
            
            <!-- Content Card -->
            <div class="content-card">
                <!-- Betreiber Section -->
                <div class="info-section">
                    <h2 class="section-title">
                        <div class="section-icon">
                            <i class="fas fa-user-tie"></i>
                        </div>
                        Betreiber
                    </h2>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <h3 class="info-heading">
                                <i class="fas fa-building info-icon"></i>
                                Betreiberinformationen
                            </h3>
                            <div class="info-content">
                                Luis Youssef Schulze<br>
                                Ebereschenweg 8<br>
                                18198 Stäbelow<br>
                                Deutschland
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Contact Section -->
                <div class="info-section">
                    <h2 class="section-title">
                        <div class="section-icon">
                            <i class="fas fa-address-card"></i>
                        </div>
                        Kontaktmöglichkeiten
                    </h2>
                    
                    <div class="contact-items">
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="contact-content">
                                <div class="contact-label">Name</div>
                                <div class="contact-value">Luis Youssef Schulze</div>
                            </div>
                        </div>
                        
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fas fa-map-marker-alt"></i>
                            </div>
                            <div class="contact-content">
                                <div class="contact-label">Anschrift</div>
                                <div class="contact-value">
                                    Ebereschenweg 8<br>
                                18198 Stäbelow<br>
                                Deutschland
                                </div>
                            </div>
                        </div>
                        
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <div class="contact-content">
                                <div class="contact-label">E-Mail</div>
                                <div class="contact-value">contact@springles.xyz</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                
                
                <!-- Back Button -->
                <div style="text-align: center;">
                    <a href="/" class="back-link">
                        <i class="fas fa-arrow-left"></i>
                        Zurück zur Startseite
                    </a>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Funktion zum Erstellen der fliegenden Punkte
        function createFloatingDots() {
            const container = document.getElementById('dots-container');
            const dotCount = 50;
            
            for (let i = 0; i < dotCount; i++) {
                const dot = document.createElement('div');
                dot.className = 'floating-dot';
                
                // Zufällige Startposition
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const delay = Math.random() * 20;
                const duration = 15 + Math.random() * 10;
                
                dot.style.left = `${x}%`;
                dot.style.bottom = `${-5}%`;
                dot.style.animationDelay = `${delay}s`;
                dot.style.animationDuration = `${duration}s`;
                
                // Zufällige Größe
                const size = Math.random() * 4 + 1;
                dot.style.width = `${size}px`;
                dot.style.height = `${size}px`;
                
                container.appendChild(dot);
            }
        }
        
        // Nach dem Laden der Seite ausführen
        document.addEventListener('DOMContentLoaded', function() {
            // Schwebende Punkte erstellen
            createFloatingDots();
            
            // E-Mail-Kopier-Funktion
            const emailValue = document.querySelector('.contact-item:nth-child(3) .contact-value');
            if (emailValue && emailValue.textContent.includes('@')) {
                emailValue.style.cursor = 'pointer';
                emailValue.title = 'Klicken zum Kopieren';
                
                emailValue.addEventListener('click', function() {
                    const email = this.textContent.trim();
                    navigator.clipboard.writeText(email).then(() => {
                        const originalText = this.textContent;
                        this.textContent = 'E-Mail kopiert! ✓';
                        this.style.color = var(--neon-green);
                        
                        setTimeout(() => {
                            this.textContent = originalText;
                            this.style.color = '';
                        }, 2000);
                    });
                });
            }
        });
    </script>
</body>
</html>
